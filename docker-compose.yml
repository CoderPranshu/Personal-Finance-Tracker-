#
# docker-compose.yml
# ------------------
# Bonus requirement: local Postgres + Redis using Docker.
#
# Start:
#   docker compose up -d
#
# Stop:
#   docker compose down
#

services:
  postgres:
    image: postgres:16
    container_name: finance_tracker_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: finance_tracker_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

